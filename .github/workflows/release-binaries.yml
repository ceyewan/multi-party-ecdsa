name: Release binaries

on:
  workflow_dispatch:
  push:
    tags:
      - "v*.*.*"

env:
  CARGO_TERM_COLOR: always
  BUILD_FLAGS: --release --examples --no-default-features --features curv-kzen/num-bigint

jobs:
  build:
    name: Build ${{ matrix.artifact }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact: linux_amd64
            ext: ""
            archive_ext: tar.gz
            examples: "gg20_sm_manager gg20_keygen gg20_signing"
          - os: macos-14
            artifact: darwin_arm64
            ext: ""
            archive_ext: tar.gz
            examples: "gg20_sm_manager gg20_keygen gg20_signing"
          - os: windows-latest
            artifact: windows_amd64
            ext: ".exe"
            archive_ext: zip
            examples: "gg20_sm_manager gg20_keygen gg20_signing"

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.artifact }}

      - name: Build examples
        run: cargo build ${{ env.BUILD_FLAGS }} --locked

      - name: Collect binaries
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "dist/${{ matrix.artifact }}"
          for example in ${{ matrix.examples }}; do
            src="target/release/examples/${example}${{ matrix.ext }}"
            case "$example" in
              gg20_sm_manager)
                dst="gg20_sm_manager_${{ matrix.artifact }}${{ matrix.ext }}"
                ;;
              gg20_keygen)
                dst="gg20_keygen_${{ matrix.artifact }}${{ matrix.ext }}"
                ;;
              gg20_signing)
                dst="gg20_signing_${{ matrix.artifact }}${{ matrix.ext }}"
                ;;
            esac
            cp "$src" "dist/${{ matrix.artifact }}/$dst"
          done

      - name: Package tarball
        if: matrix.archive_ext == 'tar.gz'
        shell: bash
        run: tar -czf "gg20_${{ matrix.artifact }}.tar.gz" -C "dist/${{ matrix.artifact }}" .

      - name: Package zip
        if: matrix.archive_ext == 'zip'
        shell: pwsh
        run: Compress-Archive -Path "dist/${{ matrix.artifact }}/*" -DestinationPath "gg20_${{ matrix.artifact }}.zip"

      - uses: actions/upload-artifact@v4
        with:
          name: gg20_${{ matrix.artifact }}
          path: gg20_${{ matrix.artifact }}.${{ matrix.archive_ext }}
          if-no-files-found: error

  github-release:
    name: Attach to GitHub release
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
